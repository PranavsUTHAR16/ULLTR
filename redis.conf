# =========================================================================
# Pure In-Memory Redis Configuration for Real-Time Market Data Ingestion
# =========================================================================

# Disable standard RDB snapshots completely
save ""

# Disable Append-Only File (AOF) persistence
appendonly no

# Resource Limits & Memory Management
# 256 megabytes is more than enough to cache hundreds of live option chains
maxmemory 256mb

# When maxmemory is reached, evict keys using Least Recently Used (LRU) algorithm
maxmemory-policy allkeys-lru

# Performance optimizations
tcp-keepalive 60
databases 16

# Unix domain socket configuration for ultra-low latency IPC
unixsocket /Users/prana/Desktop/open_source/web/redis.sock
unixsocketperm 777
